## application parameters
image_parameters:
  # Must be divisible by 8 (the U-Net has 3 pooling levels). Source images are
  # CelebA 178x218; the GFPGAN restoration pass in main_inference.py recovers
  # photographic detail and can also upscale the final result.
  image_width: 224
  image_height: 224
  image_channels: 3
  dataset_path: '/home/igor/datasets/FRLL'   # source face images (FRLL frontal)

landmark_parameters:
  number_of_landmarks: 68

plotting_parameters:
  plot_image: 'false'

morphing_parameters:
  alpha: 0.5
  morph_strategy: 'most_distant'

quality_parameters:
  # Mitigations for blend errors (ghosting / visible hull seams). None of these
  # require retraining the model - they only affect pair selection, frontality
  # filtering and the classical compositing around the network.
  shape_threshold: 0.09      # max pose/shape divergence for a blendable pair
                             # (Procrustes shape_distance; lower = stricter). 0.12 was loose.
  max_yaw: 0.18              # reject non-frontal faces: max nose/eye horizontal
                             # asymmetry (0 = perfectly frontal). null disables the gate.
  hull_feather: 15           # face-mask feather radius in px (bigger = softer seam)
  poisson_erode: 2           # erosion iters before seamlessClone (more = cleaner boundary)
  align_faces: false         # similarity-align & crop each face (eyes -> canonical
                             # template) at landmark time: centers/scales the face
                             # consistently (better detail + identity) and removes
                             # in-plane roll. ENABLING THIS CHANGES THE TRAINING-DATA
                             # DISTRIBUTION: re-run main_save_landmarks AND retrain
                             # (main_train_model) for the dataset flow. Inference on
                             # existing weights still works but with a mild mismatch.

model_parameters:
  train_morph_model: true
  morph_epochs: 70
  batch_size: 8

dataset_parameters:
  dataset_name: 'cfd'              # which landmarked dataset the morph scripts
                                       # consume: landmarked images are read from
                                       # output_dataset/<dataset_name>, and
                                       # main_generate writes to morphed_dataset/<dataset_name>
  train_dir: 'output_dataset/train'    # landmarked training images/csvs
  val_dir: 'output_dataset/val'        # landmarked validation images/csvs
  cache_dir: 'cache'                   # where warped-pair .npz files are written
  val_split: 0.15                      # fraction of identities held out for val
  max_pairs: 174                      # cap on train pairs (null = all combinations)
  max_val_pairs: 30
  seed: 42