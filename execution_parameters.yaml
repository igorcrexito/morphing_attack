## application parameters
image_parameters:
  # Must be divisible by 8 (the U-Net has 3 pooling levels). Source images are
  # CelebA 178x218; the GFPGAN restoration pass in main_inference.py recovers
  # photographic detail and can also upscale the final result.
  image_width: 224
  image_height: 224
  image_channels: 3
  dataset_path: '/home/igor/PycharmProjects/morphing_dataset'

landmark_parameters:
  number_of_landmarks: 68

plotting_parameters:
  plot_image: 'false'

morphing_parameters:
  alpha: 0.5

model_parameters:
  train_morph_model: true
  morph_epochs: 150
  batch_size: 4

dataset_parameters:
  output_dir: 'output_dataset/1000'   # where landmarked images/csvs live
  cache_dir: 'cache'                   # where warped-pair .npz files are written
  val_split: 0.15                      # fraction of identities held out
  max_pairs: 2500                      # cap on train pairs (null = all combinations)
  max_val_pairs: 300
  seed: 42